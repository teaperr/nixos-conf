alias "aim_botz" "map aim_botz customgamemode=3070244462 nomapvalidation=true"

// sensitivities
alias "25cm" "sensitivity 1.3854"
alias "30cm" "sensitivity 1.1545"
alias "34cm" "sensitivity 1.0187"
alias "38cm" "sensitivity 0.9114"
alias "42cm" "sensitivity 0.8247"
alias "50cm" "sensitivity 0.6927"
alias "55cm" "sensitivity 0.6298"
alias "60cm" "sensitivity 0.5773"

// audio
snd_menumap_volume 0.0 // main menu ambience volume
sound_device_override Built-in Audio Analog Stereo // sound device
snd_headphone_eq 1 // eq profile
snd_mute_losefocus 0

// music
snd_menumusic_volume 0
snd_roundstart_volume 0
snd_roundaction_volume 0
snd_roundend_volume 0
snd_mvp_volume 0.15
snd_mapobjective_volume 0.05
snd_tensecondwarning_volume 0.05
snd_deathcamera_volume 0
snd_mute_mvp_music_live_players 1

// game

con_enable 1
mm_dedicated_search_maxping 50
rate 786432
cl_net_buffer_ticks 0

// hud
hud_scaling 0.8
cl_hud_color 11
cl_teamcounter_playercount_instead_of_avatars 0
cl_weapon_selection_rarity_color 0
cl_teamid_overhead_mode 3
cl_teammate_colors_show 1
cl_teamid_overhead_colors_show 1
lobby_default_privacy_bits2 1
ui_setting_advertiseforhire_auto 0

// communication
cl_player_ping_mute 0
cl_mute_enemy_team 0
cl_mute_all_but_friends_and_party 0
cl_allow_animated_avatars 1
cl_sanitize_player_names 0

// item
cl_sniper_delay_unscope 0
cl_sniper_auto_rezoom 1
cl_silencer_mode 1
cl_showloadout 1
cl_use_opens_buy_menu 1
cl_buywheel_donate_key 0

// radar
cl_radar_always_centered 1
cl_radar_rotate 1
cl_hud_radar_map_additive 1
cl_hud_radar_background_alpha 0.65
cl_hud_radar_scale 1.1
cl_radar_scale 0.3
cl_radar_scale_alternate 1
bind "5" "toggleradarscale"
cl_radar_square_with_scoreboard 0

// lineup reticle
cl_grenadecrosshair_keepusercrosshair 1
cl_grenadecrosshair_flash 0
cl_grenadecrosshairdelay_flash "0.000000"
cl_grenadecrosshair_explosive 0
cl_grenadecrosshairdelay_explosive "0.000000"
cl_grenadecrosshair_fire 0
cl_grenadecrosshairdelay_fire "0.000000"
cl_grenadecrosshair_smoke 0
cl_grenadecrosshairdelay_smoke "0.000000"
cl_grenadecrosshair_decoy 0
cl_grenadecrosshairdelay_decoy "2.000000"

// dmg prediction
cl_predict_body_shot_fx 0
cl_predict_head_shot_fx 0
cl_predict_kill_ragdolls 0

// zoom_sensitivity_ratio 0.818933
zoom_sensitivity_ratio 1

cl_prefer_lefthanded 0
switchhandsright
bind "1" "switchhands"

bind "2" "slot1"
bind "3" "slot2"
bind "4" "slot4"
bind "alt" "slot5"
bind "mouse4" "slot3"
bind "h" "slot12" // healthshot

bind "mouse5" "+voicerecord"

bind "F2" "vote option2; noclip"

alias "dc" "disconnect"
alias "q" "host_writeconfig; quit"

// increase volume while shifting
// alias +incvol "incrementvar volume 0 2 0.5;+sprint";alias -incvol "incrementvar volume 0 2 -0.5;-sprint"; bind shift +incvol

// volume binds
bind "i" "incrementvar volume 0 10 -0.1"; bind "o" "incrementvar volume 0 10 0.1"

// viewmodel
viewmodel_fov 68;
viewmodel_offset_x 2.5;
viewmodel_offset_y 2;
viewmodel_offset_z -1.5;
viewmodel_presetpos 1;
r_drawtracers_firstperson 1

// toggle mute team
bind "\" "toggle cl_mute_all_but_friends_and_party"

// buy binds

// full buy
bind "9" "buy vesthelm; buy incgrenade; buy molotov; buy hegrenade; buy smokegrenade; buy flashbang; buy m4a1; buy ak47;"
// full util
bind "8" "buy incgrenade; buy molotov; buy hegrenade; buy smokegrenade; buy flashbang;"
// deagle helm
bind "7" "buy deagle; buy vest; buy vesthelm;"
// kev / helm
bind "F5" "buy vest; buy vesthelm;"

// flash
bind z "buy flashbang; slot7";
// smoke
bind x "buy smokegrenade; slot8";
// he
bind c "buy hegrenade; slot6";
// molly
bind v "buy incgrenade; buy molotov; slot10";

// refund all
bind "0" "sellbackall"

// ui stuff
cl_teammate_colors_show 2
cl_teamid_overhead_mode 3
cl_scoreboard_survivors_always_on 1

// crosshair toggle keybind
alias toggle_crosshair "crosshair_state"

alias crosshair_state "crosshair_state_0"

alias spray_crosshair "exec spray_crosshair"

alias tap_crosshair "exec tap_crosshair"

alias crosshair_state_0 "spray_crosshair; alias crosshair_state crosshair_state_1;"
alias crosshair_state_1 "tap_crosshair; alias crosshair_state crosshair_state_0;"

// bind "alt" "toggle_crosshair"

bind "p" "toggle cl_draw_only_deathnotices 0 1; toggle cl_hud_telemetry_frametime_show 0 2; toggle cl_hud_telemetry_net_misdelivery_show 0 2; toggle cl_hud_telemetry_ping_show 0 2"

cl_crosshair_sniper_width 1;
cl_crosshair_friendly_warning 0;
hud_showtargetid 1;
cl_hud_color 11;

// stops the game losing frames when tabbing out
engine_no_focus_sleep 0

// stuff for responsiveness
fps_max 0
fps_max_ui 0
cl_interp 0.015625
cl_interp_ratio 1

// default binds
bind "SPACE" "+jump"
bind "w" "+forward"
bind "a" "+left"
bind "s" "+back"
bind "d" "+right"
bind "shift" "+sprint"

bind "mwheelup" "+jump"
bind "mwheeldown" "+jump"

alias "fxa" "sound_device_override Source2SDLDefaultDevice; sound_device_override Built-in Audio Analog Stereo;"
bind "BACKSPACE" "fxa"

fxa

exec nulls
exec movement
