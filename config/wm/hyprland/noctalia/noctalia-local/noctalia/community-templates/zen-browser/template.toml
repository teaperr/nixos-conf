[catalog.zen-browser]
name = "Zen Browser"
category = "browser"

[templates.zen_browser_chrome]
input_path = "zen-userChrome.css"
output_path = "$XDG_CACHE_HOME/noctalia/zen-browser/zen-userChrome.css"
post_hook = "bash '{{ config_dir }}/apply.sh'"

[templates.zen_browser_content]
input_path = "zen-userContent.css"
output_path = "$XDG_CACHE_HOME/noctalia/zen-browser/zen-userContent.css"
post_hook = "bash '{{ config_dir }}/apply.sh'"
